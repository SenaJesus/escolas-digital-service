services:
  postgres:
    image: postgres:16-alpine
    container_name: escolas-org-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: escolas_org
      POSTGRES_USER: escolas
      POSTGRES_PASSWORD: escolas
    ports:
      - "5433:5432"
    volumes:
      - escolas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escolas -d escolas_org"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: escolas-org-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: escolas
      MINIO_ROOT_PASSWORD: escolas-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - escolas_minio_data:/data

volumes:
  escolas_pg_data:
  escolas_minio_data:
